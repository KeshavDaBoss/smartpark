<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Bookings - SmartPark</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error-container": "#a70138",
                        "on-primary": "#4f006c",
                        "on-tertiary-container": "#563e00",
                        "secondary-fixed-dim": "#71eaba",
                        "on-secondary-container": "#e0ffee",
                        "primary-fixed-dim": "#ce7eec",
                        "secondary-fixed": "#80f9c8",
                        "on-primary-fixed-variant": "#5a0179",
                        "on-primary-fixed": "#21002f",
                        "background": "#0e0e0e",
                        "on-surface-variant": "#adaaaa",
                        "tertiary-dim": "#eeb200",
                        "surface-bright": "#2c2c2c",
                        "error": "#ff6e84",
                        "primary-fixed": "#dd8bfb",
                        "on-primary-container": "#3d0055",
                        "secondary": "#80f9c8",
                        "surface-dim": "#0e0e0e",
                        "primary-dim": "#ce7eec",
                        "on-tertiary": "#614700",
                        "on-background": "#ffffff",
                        "tertiary": "#ffd16f",
                        "on-secondary": "#005e43",
                        "surface-container-lowest": "#000000",
                        "inverse-primary": "#893da7",
                        "outline-variant": "#484847",
                        "tertiary-container": "#ffbf00",
                        "surface": "#0e0e0e",
                        "surface-container-high": "#201f1f",
                        "surface-container": "#1a1919",
                        "inverse-surface": "#fcf9f8",
                        "tertiary-fixed-dim": "#eeb200",
                        "surface-tint": "#e08efe",
                        "on-tertiary-fixed": "#3d2b00",
                        "surface-container-low": "#131313",
                        "on-secondary-fixed": "#004933",
                        "error-dim": "#d73357",
                        "on-secondary-fixed-variant": "#00694b",
                        "on-error-container": "#ffb2b9",
                        "on-error": "#490013",
                        "surface-variant": "#262626",
                        "tertiary-fixed": "#ffbf00",
                        "outline": "#767575",
                        "on-surface": "#ffffff",
                        "secondary-dim": "#71eaba",
                        "surface-container-highest": "#262626",
                        "primary": "#e08efe",
                        "primary-container": "#d180ef",
                        "secondary-container": "#006c4e",
                        "on-tertiary-fixed-variant": "#614700",
                        "inverse-on-surface": "#565555"
                    },
                    fontFamily: {
                        "headline": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(26, 25, 25, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            border-color: rgba(224, 142, 254, 0.2);
            box-shadow: 0 0 30px rgba(224, 142, 254, 0.05);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen">
<!-- TopAppBar consistent with Mall 1 floorplan -->
<header class="bg-[#0e0e0e]/80 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0_4px_30px_rgba(224,142,254,0.06)]">
<div class="flex justify-between items-center px-10 h-20 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-8">
<span class="text-2xl font-bold tracking-tight text-purple-400 font-headline">SmartPark</span>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-slate-400 cursor-pointer hover:text-primary transition-colors">account_circle</span>
</div>
</div>
</header>
<main class="pt-24 min-h-screen px-6 md:px-10 pb-12 max-w-7xl mx-auto">
<!-- Back to Dashboard -->
<nav class="mb-6">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-xl transition-transform group-hover:-translate-x-1">arrow_back</span>
<span class="font-headline font-bold text-sm uppercase tracking-widest">Back to Dashboard</span>
</button>
</nav>
<!-- Header Section -->
<header class="mb-12">
<h1 class="font-headline text-5xl font-bold text-white tracking-tight">My Bookings</h1>
</header>
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<!-- Booking Card 1 -->
<div class="glass-card rounded-3xl p-8 flex flex-col relative overflow-hidden group">
<div class="flex justify-between items-start mb-10">
<div>
<span class="inline-flex items-center px-3 py-1 rounded-full bg-secondary-container/30 text-secondary text-[10px] font-bold uppercase tracking-widest mb-4 border border-secondary/20">
<span class="w-1.5 h-1.5 rounded-full bg-secondary mr-2 shadow-[0_0_8px_rgba(128,249,200,0.5)]"></span>
                            Confirmed
                        </span>
<h2 class="font-headline text-4xl font-bold text-white mb-2">Mall 1</h2>
<div class="flex items-center gap-2 text-on-surface-variant font-label text-sm">
<span class="material-symbols-outlined text-lg" data-icon="calendar_today">calendar_today</span>
<span>Today, Oct 24</span>
</div>
</div>
<div class="bg-surface-container-highest/50 border border-white/5 p-4 rounded-2xl flex flex-col items-center justify-center min-w-[80px]">
<span class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mb-1">Slot</span>
<span class="text-3xl font-headline font-bold text-primary">S1</span>
</div>
</div>
<div class="space-y-4 mb-10">
<div class="flex items-center justify-between p-5 bg-surface-container-low/50 rounded-2xl border border-white/5">
<span class="text-on-surface-variant font-label font-medium">Level</span>
<span class="text-white font-headline font-bold">Level 1</span>
</div>
</div>
<div class="flex flex-col gap-4">
<button class="flex items-center justify-center gap-3 bg-primary/10 border border-primary/20 text-primary w-full py-4 rounded-xl font-headline font-bold uppercase tracking-widest hover:bg-primary hover:text-on-primary transition-all shadow-[0_0_30px_rgba(224,142,254,0.1)] active:scale-[0.98]">
<span class="material-symbols-outlined">near_me</span>
                        Navigate to Slot
                    </button>
<button class="w-full py-4 rounded-xl border border-white/10 text-on-surface-variant font-headline font-bold uppercase tracking-widest hover:bg-error/10 hover:text-error hover:border-error/30 transition-all active:scale-[0.98]">
                        Cancel Booking
                    </button>
</div>
<!-- Decorative Glow -->
<div class="absolute -bottom-20 -right-20 w-40 h-40 bg-primary/5 blur-[80px] pointer-events-none"></div>
</div>
<!-- Booking Card 2 -->
<div class="glass-card rounded-3xl p-8 flex flex-col relative overflow-hidden group">
<div class="flex justify-between items-start mb-10">
<div>
<span class="inline-flex items-center px-3 py-1 rounded-full bg-surface-container-highest/50 text-on-surface-variant text-[10px] font-bold uppercase tracking-widest mb-4 border border-white/10">
<span class="w-1.5 h-1.5 rounded-full bg-on-surface-variant/40 mr-2"></span>
                            Upcoming
                        </span>
<h2 class="font-headline text-4xl font-bold text-white mb-2">Mall 2</h2>
<div class="flex items-center gap-2 text-on-surface-variant font-label text-sm">
<span class="material-symbols-outlined text-lg" data-icon="event">event</span>
<span>Tomorrow, Oct 25</span>
</div>
</div>
<div class="bg-surface-container-highest/50 border border-white/5 p-4 rounded-2xl flex flex-col items-center justify-center min-w-[80px]">
<span class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest mb-1">Slot</span>
<span class="text-3xl font-headline font-bold text-primary">S2</span>
</div>
</div>
<div class="space-y-4 mb-10">
<div class="flex items-center justify-between p-5 bg-surface-container-low/50 rounded-2xl border border-white/5">
<span class="text-on-surface-variant font-label font-medium">Level</span>
<span class="text-white font-headline font-bold">Level 1</span>
</div>
</div>
<div class="flex flex-col gap-4">
<button class="flex items-center justify-center gap-3 bg-primary/10 border border-primary/20 text-primary w-full py-4 rounded-xl font-headline font-bold uppercase tracking-widest hover:bg-primary hover:text-on-primary transition-all shadow-[0_0_30px_rgba(224,142,254,0.1)] active:scale-[0.98]">
<span class="material-symbols-outlined">near_me</span>
                        Navigate to Slot
                    </button>
<button class="w-full py-4 rounded-xl border border-white/10 text-on-surface-variant font-headline font-bold uppercase tracking-widest hover:bg-error/10 hover:text-error hover:border-error/30 transition-all active:scale-[0.98]">
                        Cancel Booking
                    </button>
</div>
</div>
</div>
</main>
</body></html>
