<style>
        body {
            background-color: #0e0e0e;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-space-grotesk { font-family: 'Space Grotesk', sans-serif; }
        .glass-card {
            background: rgba(19, 19, 19, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .kinetic-glow {
            box-shadow: 0 0 60px -15px rgba(224, 142, 254, 0.15);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

        .luminous-btn {
            background: linear-gradient(135deg, #e08efe 0%, #ce7eec 100%);

            box-shadow: 0 0 20px 2px rgba(224, 142, 254, 0.4);
        }

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center selection:bg-primary selection:text-on-primary-container">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Main Content Shell -->
<main class="w-full max-w-md px-6 py-12 flex flex-col items-center">
<!-- Logo Header -->
<div class="mb-12 text-center">
<h1 class="text-5xl font-bold tracking-tighter font-headline text-primary-fixed mb-2">SmartPark</h1>
</div>
<!-- Auth Card -->
<div class="glass-card w-full p-8 rounded-[2rem] border border-outline-variant/10 kinetic-glow relative overflow-hidden">
<!-- Auth Mode Tabs -->
<div class="flex items-center justify-between mb-10 bg-surface-container-lowest/50 p-1.5 rounded-full border border-outline-variant/5">
<button class="flex-1 py-2.5 px-6 rounded-full text-sm font-semibold transition-all duration-300 bg-surface-container-highest text-primary-fixed">
                    Login
                </button>
<button class="flex-1 py-2.5 px-6 rounded-full text-sm font-semibold transition-all duration-300 text-on-surface-variant hover:text-on-surface">
                    Sign Up
                </button>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider ml-1">Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg" data-icon="account_circle">account_circle</span>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 text-sm focus:ring-1 focus:ring-primary transition-all placeholder:text-outline" placeholder="Enter your identifier" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-medium text-on-surface-variant uppercase tracking-wider ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 text-sm focus:ring-1 focus:ring-primary transition-all placeholder:text-outline" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Signup Specific Options (Hidden in Login Mode - displayed here for layout context) -->
<div class="space-y-4 pt-2 hidden">
<label class="flex items-center space-x-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-outline-variant bg-surface-container-highest text-primary focus:ring-0 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute opacity-0 peer-checked:opacity-100 text-on-primary-container text-xs pointer-events-none left-1/2 -translate-x-1/2" data-icon="check" data-weight="fill">check</span>
</div>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Disabled parking needed</span>
</label>
<label class="flex items-center space-x-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-outline-variant bg-surface-container-highest text-primary focus:ring-0 focus:ring-offset-0 transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute opacity-0 peer-checked:opacity-100 text-on-primary-container text-xs pointer-events-none left-1/2 -translate-x-1/2" data-icon="check" data-weight="fill">check</span>
</div>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Elderly user profile</span>
</label>
</div>
<!-- Primary CTA -->
<button class="luminous-btn w-full py-4 rounded-xl text-on-primary-container font-bold text-sm uppercase tracking-widest transition-all mt-4" type="submit">
                    Access System
                </button>
</form>
<!-- Mode Toggle Link -->
<div class="mt-8 text-center">
<a class="text-xs text-on-surface-variant hover:text-primary transition-colors inline-flex items-center gap-1" href="#">
                    Don't have an account? <span class="text-primary font-semibold">Sign Up</span>
</a>
</div>
</div>
<!-- Demo Login Section -->
<div class="mt-12 w-full">
<div class="flex items-center gap-4 mb-6">
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] uppercase tracking-[0.3em] text-outline font-bold">Quick Access Demo</span>
<div class="h-[1px] flex-1 bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-3">
<button class="bg-surface-container-low border border-outline-variant/10 py-3 px-4 rounded-xl flex items-center justify-between hover:bg-surface-container-high transition-all group">
<span class="text-xs text-on-surface-variant group-hover:text-on-surface">User 1 (Normal)</span>
<span class="material-symbols-outlined text-sm text-primary/40 group-hover:text-primary" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="bg-surface-container-low border border-outline-variant/10 py-3 px-4 rounded-xl flex items-center justify-between hover:bg-surface-container-high transition-all group">
<span class="text-xs text-on-surface-variant group-hover:text-on-surface">User 2 (Disabled)</span>
<span class="material-symbols-outlined text-sm text-primary/40 group-hover:text-primary" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="bg-surface-container-low border border-outline-variant/10 py-3 px-4 rounded-xl flex items-center justify-between hover:bg-surface-container-high transition-all group">
<span class="text-xs text-on-surface-variant group-hover:text-on-surface">User 3 (Elderly)</span>
<span class="material-symbols-outlined text-sm text-primary/40 group-hover:text-primary" data-icon="arrow_forward">arrow_forward</span>
</button>
<button class="bg-surface-container-low border border-outline-variant/10 py-3 px-4 rounded-xl flex items-center justify-between hover:bg-surface-container-high transition-all group">
<span class="text-xs text-on-surface-variant group-hover:text-on-surface">User 4 (Admin)</span>
<span class="material-symbols-outlined text-sm text-primary/40 group-hover:text-primary" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>

<footer class="w-full mt-auto py-10 px-10 flex flex-col md:flex-row justify-between items-center border-t border-outline-variant/10 space-y-4 md:space-y-0">
<p class="text-[10px] font-body text-on-surface-variant uppercase tracking-[0.2em]">
            © 2024 SmartPark
        </p>
<div class="flex gap-8">
<a class="text-[10px] font-body text-on-surface-variant uppercase tracking-[0.2em] hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-[10px] font-body text-on-surface-variant uppercase tracking-[0.2em] hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-[10px] font-body text-on-surface-variant uppercase tracking-[0.2em] hover:text-primary transition-colors" href="#">Support</a>
</div>
